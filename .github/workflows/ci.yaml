name: CI

on:
  push:
    branches:
      - main
      - "renovate/**"
  pull_request:
    branches:
      - main

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run shellcheck
        run: |
          shellcheck --severity=warning \
            scripts/common.sh \
            scripts/build-extensions.sh \
            scripts/derive-versions.sh

  verify-versions:
    name: Verify derived versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify PKGS_COMMIT matches TALOS_VERSION
        run: bash scripts/derive-versions.sh --verify

  go-vet:
    name: Go vet (device plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: plugins/rk3588-npu-device-plugin/go.mod
          cache-dependency-path: plugins/rk3588-npu-device-plugin/go.sum
      - name: go vet
        run: |
          cd plugins/rk3588-npu-device-plugin
          go vet ./...

  yaml-validate:
    name: Validate YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate workflow YAMLs
        run: |
          python3 - <<'EOF'
          import yaml, sys, os, glob

          files = glob.glob(".github/workflows/*.yaml")
          failed = False
          for f in files:
              try:
                  yaml.safe_load(open(f))
                  print(f"PASS: {f}")
              except yaml.YAMLError as e:
                  print(f"FAIL: {f}: {e}")
                  failed = True
          sys.exit(1 if failed else 0)
          EOF
      - name: Validate pkg.yaml files
        run: |
          python3 - <<'EOF'
          import yaml, sys, glob

          files = glob.glob("**/pkg.yaml", recursive=True)
          if not files:
              print("No pkg.yaml files found yet — skipping")
              sys.exit(0)
          failed = False
          for f in files:
              try:
                  yaml.safe_load(open(f))
                  print(f"PASS: {f}")
              except yaml.YAMLError as e:
                  print(f"FAIL: {f}: {e}")
                  failed = True
          sys.exit(1 if failed else 0)
          EOF
